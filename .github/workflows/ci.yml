name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push obsoletes in-flight runs; macOS minutes bill at 10x, so never
# let two runs of the same ref race.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (macOS)
    # macos-26 ships Xcode 26 / Swift 6.3 (matches local dev). If this label
    # ever sits queued (image retired/renamed), fall back to macos-latest —
    # the code also compiles under Swift 6.0.
    runs-on: macos-26
    # Builds finish in ~2 min on a healthy runner (one probe runner took 15+
    # for GRDB alone — variance is real). The known failure mode is a HANG in
    # test execution (a 45-min probe compiled everything in 80s, then
    # swiftpm-testing sat silent for 44 min); 25 min bounds it.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          swift --version
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-
      - name: Run tests
        # `script` gives the test child a PTY so its per-test output is
        # line-buffered — without it a hang leaves a silent log with no
        # indication of which test stalled.
        run: script -q /dev/null swift test
