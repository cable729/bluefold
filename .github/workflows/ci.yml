name: CI

# The repo is public (2026-07): standard macOS runners are free, so CI runs
# on every PR AND on pushes to main (main pushes also give Codecov the base
# coverage that PR patch-coverage checks diff against). The old private-repo
# frugal mode is retired. Remaining constraints are about hangs and queue
# slots, not cost: per-module kill-timeouts, concurrency-cancel, and few jobs
# per run (free-plan macOS concurrency caps at 5).
#
# CI is the merge gate for agent PRs — but not the ONLY gate: the CI-blind
# test class (real display / TCC) runs locally via scripts/merge-pr.sh.
on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

# A newer push obsoletes in-flight runs; never let two runs of one ref race.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (macOS)
    # macos-26 ships Xcode 26 / Swift 6.3 (matches local dev). If this label
    # ever sits queued (image retired/renamed), fall back to macos-latest —
    # the code also compiles under Swift 6.0.
    runs-on: macos-26
    # id-token: write lets the Codecov step mint an OIDC token (tokenless
    # upload for public repos); contents: read is the default checkout scope.
    permissions:
      contents: read
      id-token: write
    # The known CI failure mode is a WHOLE-RUNNER deadlock: the PTY probe
    # showed all 116 tests "started" in the same instant and not one
    # completed in 23 minutes. Running each test target separately with its
    # own kill-timeout isolates which module(s) carry the deadlock, and any
    # healthy modules still get exercised.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          swift --version
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-
      - name: Spec-ID sync check
        # The tests are the spec; docs/specs/*.md are indexes. Drift fails.
        run: ./scripts/check-spec-ids.sh
      - name: Build tests
        run: swift build --build-tests --enable-code-coverage
      - name: Run tests per module
        # PTY (`script`) keeps per-test output line-buffered; gtimeout KILLs
        # a deadlocked module after 5 min instead of eating the whole job.
        # Each module run overwrites default.profdata, so it is squirreled
        # away per module and merged for the coverage export below.
        run: |
          command -v gtimeout >/dev/null 2>&1 || brew install -q coreutils
          PROFDIR="$(mktemp -d)"
          echo "PROFDIR=$PROFDIR" >> "$GITHUB_ENV"
          BIN="$(swift build --show-bin-path)"
          status=0
          for target in ReaderCoreTests CalibreKitTests ReaderPersistenceTests \
                        SearchIndexKitTests SyncKitTests ReaderUITests; do
            echo "::group::${target}"
            if gtimeout --signal=KILL 300 script -q /dev/null \
                swift test --skip-build --enable-code-coverage --filter "${target}"; then
              echo "${target}: OK"
            else
              echo "::error::${target}: FAILED or DEADLOCKED (killed at 300s)"
              status=1
            fi
            [ -f "$BIN/codecov/default.profdata" ] && \
              cp "$BIN/codecov/default.profdata" "$PROFDIR/${target}.profdata"
            echo "::endgroup::"
          done
          exit "${status}"
      - name: Export coverage (lcov)
        # Merged across the per-module runs; Tests/ and .build excluded so
        # the report answers "which PRODUCTION code is untested".
        run: |
          BIN="$(swift build --show-bin-path)"
          xcrun llvm-profdata merge -sparse "$PROFDIR"/*.profdata \
            -o "$PROFDIR/merged.profdata"
          XCTEST_BIN="$(find "$BIN" -name '*.xctest' -maxdepth 1 | head -1)"
          XCTEST_BIN="$XCTEST_BIN/Contents/MacOS/$(basename "$XCTEST_BIN" .xctest)"
          xcrun llvm-cov export -format=lcov \
            -instr-profile "$PROFDIR/merged.profdata" \
            -ignore-filename-regex="(Tests|\.build)/" \
            "$XCTEST_BIN" > coverage.lcov
          wc -l coverage.lcov
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          use_oidc: true
          # Coverage is informational infra, not a correctness gate — a
          # missing Codecov app install or a transient upload error must
          # never fail the build. (The patch-coverage MERGE gate is enforced
          # by Codecov's own status check, not by this step.)
          fail_ci_if_error: false

  # Job B (M17): the app built and driven for real — XCUITest smoke flows
  # (session restore, tab dragging) that unit tests cannot see. Runs in
  # parallel with the unit-test job; app bundle ID gets a .ci suffix so a
  # runner reused across attempts can never collide with a stale instance.
  ui-test:
    name: XCUITest smoke (macOS)
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Run UI tests
        # xcodebuild's UI-test RUNNER process is spawned by testmanagerd, not
        # by this shell, so it does NOT inherit the runner's `CI` env var.
        # xcodebuild forwards any `TEST_RUNNER_`-prefixed variable into the
        # test runner's environment with the prefix stripped — so this makes
        # `CI` visible to the XCTSkipIf guard in SmokeUITests that skips the
        # synthesized cross-window drag (unreliable on the headless runner).
        env:
          TEST_RUNNER_CI: "1"
        run: |
          set -o pipefail
          xcodebuild -project App/Bluefold.xcodeproj -scheme Bluefold \
            -configuration Debug -derivedDataPath DerivedData \
            test BLUEFOLD_BUNDLE_ID_SUFFIX=.ci 2>&1 | tee uitest.log | tail -200
      - name: Surface skipped-on-CI tests
        # Tests XCTSkipIf'd on the headless runner must stay visible, or the
        # skip list silently rots — they only really run via merge-pr.sh.
        if: always()
        run: |
          grep -E "Test [Cc]ase .* skipped" uitest.log | sort -u | while read -r line; do
            echo "::notice title=Skipped on CI (runs locally via merge-pr.sh)::${line}"
          done || true

  # Window-server lane (issue #25): the `.requiresWindowServer` ReaderUITests
  # suites are skipped on the plain `swift test` job because a bare SPM test
  # process has no window server. Here `xcodebuild test` launches the same xctest
  # bundle in the runner's GUI session, and BLUEFOLD_REAL_DISPLAY=1 flips the
  # gate back on (see WindowServerTrait). The #25 spike proved this runs the
  # single-window drag / hit-test / layout tests green; the only failures were
  # three genuine CROSS-window drags (windows are placed unreliably on the
  # runner), now carved out via `.requiresCrossWindowServer` and tracked in #49.
  # So this lane is expected GREEN. It stays `continue-on-error` for now (one
  # confirming green run before we make it a required check); flip to blocking
  # once observed stable. Drives the package scheme directly — no
  # App/Bluefold.xcodeproj changes.
  #
  # SearchIndexKitTests (`.requiresPDFIndexing`) is deliberately NOT run here:
  # spike runs showed PDFKit/Vision indexing HANGS in the GUI session too
  # (KILLed at the timeout), so it is not a window-server problem — tracked in
  # #50; re-running it would waste ~10 min of runner time per push.
  windowserver-tests:
    name: window-server UI tests (GUI session, #25)
    runs-on: macos-26
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Run window-server suites in a GUI session
        env:
          BLUEFOLD_REAL_DISPLAY: "1"
        run: |
          command -v gtimeout >/dev/null 2>&1 || brew install -q coreutils
          status=0
          # Only the two window-server-gated suites — the rest of ReaderUITests
          # already runs on the plain `swift test` job.
          gtimeout --signal=KILL 300 xcodebuild test \
              -scheme pdf-app-Package -destination 'platform=macOS' \
              -only-testing:ReaderUITests/TabStripDragTests \
              -only-testing:ReaderUITests/SplitDropZoneTests \
              > windowserver-tests.log 2>&1 || status=1
          echo "::group::results"
          grep -E "Test run with|Suite .* (failed|passed)|Killed" windowserver-tests.log | tail -20 || true
          echo "::endgroup::"
          if [ "$status" != 0 ]; then
            # If anything fails, name it — a regression here means a formerly
            # GUI-session-safe test now needs a real display (→ narrow further).
            echo "::group::failures"
            grep -E "Test [A-Za-z0-9_]+\(\) (failed|recorded an issue)" windowserver-tests.log || true
            echo "::endgroup::"
            grep -oE "✘ Test [A-Za-z0-9_]+\(\)" windowserver-tests.log | sort -u | while read -r _x _t t; do
              echo "::warning title=#25 window-server fail::${t}"
            done || true
          fi
          exit "$status"
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windowserver-tests-log
          path: windowserver-tests.log
          if-no-files-found: warn

  # iOS still has to compile (shared ReaderCore changes routinely touch it).
  ios-build:
    name: iOS simulator build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Build
        run: |
          set -o pipefail
          xcodebuild -project App/Bluefold.xcodeproj -scheme Bluefold-iOS \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath DerivedData-iOS \
            build CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50
